model:
  provider: minimax
  name: MiniMax-M2.5-highspeed
  temperature: 0.3
  max_tokens: 4096
  stream: false
  timeout_seconds: 20
  base_url: https://api.minimaxi.com/v1

agents:
  planner:
    enabled: true
  qa_agent:
    enabled: true
  tool_agent:
    enabled: true
  fallback_agent:
    enabled: true

tools:
  timeout_seconds: 10
  max_calls: 3
  retry_attempts: 1
  retryable_error_codes:
    - dependency_unavailable
    - request_timeout
    - request_failed
  circuit_breaker_threshold: 3
  circuit_breaker_cooldown_seconds: 30
  allowed_sources:
    - skill
    - mcp
  allowed_tools: []
  blocked_tools: []
  skill_tools_enabled: true
  mcp_tools_enabled: true
  skill_tools:
    - name: local_echo
      description: Echo the incoming query for tool-path validation.
      handler: echo_query
      enabled: true
      source: skill
      timeout_seconds: 5
      allowed_intents: ["tool", "hybrid"]
      input_schema:
        type: object
        properties:
          query:
            type: string
        required: ["query"]
  mcp_tools: []

rag:
  enabled: true
  docs_path: data/knowledge_base
  chunk_size: 700
  chunk_overlap: 80
  top_k: 4
  vector_store_backend: local
  local_store_path: data/vector_store.json
  collection_name: knowledge_chunks
  embedding_provider: mock
  embedding_model: mock-embedding
  embedding_dimension: 256
  embedding_api_key:
  embedding_base_url:
  embedding_batch_size: 32
  embedding_timeout_seconds: 20
  embedding_max_retries: 2
  bootstrap_on_startup: true
  request_timeout_seconds: 10
  qdrant_url:
  qdrant_api_key:

database:
  enabled: true
  url: sqlite:///data/runtime.db
  auto_init: true
  echo: false
  pool_size: 5
  max_overflow: 10
  pool_recycle_seconds: 1800

server:
  host: 0.0.0.0
  port: 8080
  log_level: INFO

observability:
  json_logs: true

app:
  max_reflections: 2
  request_timeout_seconds: 30
