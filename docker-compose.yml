services:
  multi-agents-server:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://multi_agents:multi_agents@mysql:3306/multi_agents
      DATABASE_AUTO_INIT: "true"
      RAG_VECTOR_STORE_BACKEND: qdrant
      EMBEDDING_PROVIDER: mock
      EMBEDDING_MODEL: mock-embedding
      EMBEDDING_DIMENSION: "256"
      QDRANT_URL: http://qdrant:6333
      BOOTSTRAP_KB_ON_STARTUP: "true"
    volumes:
      - ./app:/app/app
      - ./configs:/app/configs
      - ./docs:/app/docs
      - ./scripts:/app/scripts
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/readyz', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: multi_agents
      MYSQL_USER: multi_agents
      MYSQL_PASSWORD: multi_agents
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "multi_agents", "-pmulti_agents"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:v1.13.4
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /healthz HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  adminer:
    image: adminer:4.8.1
    profiles: ["devtools"]
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: pepa-linha-dark
    ports:
      - "18080:8080"

volumes:
  mysql-data:
  qdrant-data:
